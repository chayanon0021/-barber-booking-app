<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gentleman - Advanced Barber System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Check initial theme preference
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#050505', 800: '#121212', 700: '#1e1e1e' },
                        gold: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' }
                    },
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Panels (Adaptive) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(30, 30, 30, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #eab308; }

        .hidden-view { display: none !important; }

        /* Premium Inputs (Adaptive) */
        .input-premium {
            width: 100%; background: #ffffff; border: 1px solid #e5e7eb; color: #111827;
            padding: 0.75rem 1rem; border-radius: 0.75rem; transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.02);
        }
        .dark .input-premium {
            background: rgba(0,0,0,0.5); border: 1px solid #333; color: white;
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.2);
        }
        .input-premium:focus { outline: none; border-color: #eab308; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }

        /* Tab Buttons */
        .tab-btn.active { border-bottom: 2px solid #eab308; color: #eab308; font-weight: 600; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-available { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-busy { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        
        .img-fallback { background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; }
        .dark .img-fallback { background-color: #1a1a1a; }

        /* Chat bubbles (Adaptive) */
        .chat-bubble-me { background: #eab308; color: #000; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #f3f4f6; color: #111827; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e5e7eb; }
        .dark .chat-bubble-other { background: #1e1e1e; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-20 bg-gray-50 text-gray-900 dark:bg-[#050505] dark:text-gray-100 transition-colors duration-300">

    <!-- Toast & Modals -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] hidden-view opacity-0 transition-opacity duration-300 flex items-center gap-3 text-sm font-medium glass-panel">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i><span id="toast-message" class="text-gray-900 dark:text-white"></span>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/60 dark:bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-2xl max-w-sm w-full mx-4 gold-glow text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-100 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-200 dark:border-red-500/30"><i data-lucide="alert-triangle" class="w-8 h-8 text-red-600 dark:text-red-500"></i></div>
            <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-white">ยืนยันการทำรายการ</h3>
            <p id="confirm-message" class="text-gray-500 dark:text-gray-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition text-sm font-medium">ยกเลิก</button>
                <button onclick="executeConfirm()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-500 transition shadow-[0_0_15px_rgba(239,68,68,0.3)] text-sm">ยืนยัน</button>
            </div>
        </div>
    </div>

    <!-- ==================== AUTHENTICATION VIEW ==================== -->
    <main id="view-auth" class="flex-grow container mx-auto px-4 flex flex-col items-center justify-center min-h-screen relative overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-yellow-400/20 dark:bg-yellow-600/20 rounded-full blur-[100px] -z-10"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-400/20 dark:bg-blue-600/10 rounded-full blur-[100px] -z-10"></div>

        <div class="w-full max-w-md glass-panel rounded-3xl p-8 gold-glow relative">
            
            <!-- Toggle Theme Button on Auth Screen -->
            <button onclick="toggleTheme()" class="absolute top-4 right-4 text-gray-400 hover:text-gold-500 p-2 bg-gray-100 dark:bg-dark-800 rounded-full transition">
                <i data-lucide="sun" id="theme-icon-auth" class="w-5 h-5"></i>
            </button>

            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto bg-white dark:bg-dark-800 rounded-full border border-gold-500 flex items-center justify-center mb-4 shadow-[0_0_25px_rgba(234,179,8,0.3)]"><i data-lucide="scissors" class="w-10 h-10 text-gold-500"></i></div>
                <h1 class="text-3xl font-bold tracking-wider text-gray-900 dark:text-white">THE <span class="text-gold-500">GENTLEMAN</span></h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Premium Barber & Shop</p>
            </div>

            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
                <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-3 text-sm font-medium tab-btn active">เข้าสู่ระบบ</button>
                <button onclick="switchAuthTab('register')" id="tab-register" class="flex-1 py-3 text-sm font-medium text-gray-500 dark:text-gray-500 tab-btn">สมัครสมาชิก</button>
            </div>

            <form id="form-login" class="space-y-4" onsubmit="handleLogin(event)">
                <input type="text" id="login-username" required class="input-premium" placeholder="Username (เช่น berbar)">
                <input type="password" id="login-password" required class="input-premium" placeholder="รหัสผ่าน (เช่น 1234)">
                
                <div class="flex items-center gap-2 mt-2 px-1">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 accent-gold-500 rounded bg-white dark:bg-dark-800 border-gray-300 dark:border-gray-700">
                    <label for="remember-me" class="text-sm text-gray-600 dark:text-gray-400 cursor-pointer">จำการเข้าสู่ระบบไว้ในเครื่องนี้</label>
                </div>

                <button type="submit" class="w-full bg-gold-500 text-black font-bold py-3.5 rounded-xl hover:bg-gold-400 transition mt-4">เข้าสู่ระบบ</button>
            </form>

            <form id="form-register" class="space-y-4 hidden-view" onsubmit="handleRegister(event)">
                <div class="grid grid-cols-2 gap-3"><input type="text" id="reg-fname" required class="input-premium" placeholder="ชื่อจริง"><input type="text" id="reg-nname" required class="input-premium" placeholder="ชื่อเล่น"></div>
                <input type="tel" id="reg-phone" required class="input-premium" placeholder="เบอร์โทรศัพท์">
                <input type="text" id="reg-username" required class="input-premium" placeholder="Username">
                <input type="password" id="reg-password" required class="input-premium" placeholder="ตั้งรหัสผ่าน">
                <button type="submit" class="w-full bg-gray-900 dark:bg-dark-700 text-white font-bold py-3.5 rounded-xl hover:bg-gray-800 dark:hover:bg-dark-600 border border-gray-700 dark:border-gray-600 transition mt-4">สมัครสมาชิก</button>
            </form>
        </div>
    </main>

    <!-- ==================== PENDING APPROVAL VIEW ==================== -->
    <main id="view-pending" class="hidden-view flex-grow container mx-auto px-4 flex flex-col items-center justify-center min-h-screen text-center">
        <i data-lucide="clock" class="w-20 h-20 text-gold-500 mb-6 animate-pulse-slow"></i>
        <h2 class="text-2xl font-bold mb-2 text-gray-900 dark:text-white">รอการอนุมัติ</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-sm">บัญชีของคุณกำลังรอการตรวจสอบจากเจ้าของร้าน<br>ระบบจะอัปเดตอัตโนมัติเมื่อได้รับการอนุมัติ</p>
        <button onclick="logout()" class="px-6 py-2 border border-gray-300 dark:border-gray-600 rounded-full text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition">ออกจากระบบ</button>
    </main>

    <!-- ==================== MAIN APP SHELL ==================== -->
    <div id="app-shell" class="hidden-view flex flex-col min-h-screen">
        <nav class="glass-panel sticky top-0 z-40 border-b-0 border-gold-500/20">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gold-500 rounded flex items-center justify-center text-black"><i data-lucide="scissors" class="w-5 h-5"></i></div>
                    <span class="font-bold tracking-widest text-lg text-gray-900 dark:text-white">THE GENTLEMAN</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="user-display-name" class="text-sm text-gray-600 dark:text-gray-300 mr-1"></span>
                    
                    <!-- Toggle Theme Button -->
                    <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-gold-500 p-1.5 bg-gray-100 dark:bg-dark-800 rounded-lg transition" title="สลับโหมดสว่าง/มืด">
                        <i data-lucide="sun" id="theme-icon-nav" class="w-4 h-4"></i>
                    </button>

                    <button onclick="logout()" class="text-red-500 hover:text-red-600 p-1.5 bg-red-50 dark:bg-red-500/10 rounded-lg transition" title="ออกจากระบบ">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div id="main-content" class="flex-grow pb-24"></div>

        <!-- Navigation (Customer) -->
        <div id="bottom-nav" class="fixed bottom-0 w-full glass-panel border-t border-gray-200 dark:border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderCustomerHome()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item" id="nav-home"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px]">หน้าหลัก</span></button>
            <button onclick="renderCart()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 relative nav-item" id="nav-cart"><i data-lucide="shopping-bag" class="w-6 h-6"></i><span class="text-[10px]">ตะกร้า</span><span id="cart-badge" class="absolute -top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view shadow-md">0</span></button>
            <button onclick="renderHistory()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item" id="nav-history"><i data-lucide="clock-4" class="w-6 h-6"></i><span class="text-[10px]">ประวัติ</span></button>
            <button onclick="renderCustomerChat()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item" id="nav-chat"><i data-lucide="message-square" class="w-6 h-6"></i><span class="text-[10px]">ข้อความ</span></button>
        </div>

        <!-- Navigation (Admin) -->
        <div id="admin-bottom-nav" class="fixed bottom-0 w-full glass-panel border-t border-gray-200 dark:border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderAdminDashboard()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-dash"><i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="text-[10px]">ภาพรวม</span></button>
            <button onclick="renderAdminUsers()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 relative nav-item-admin" id="nav-admin-users"><i data-lucide="users" class="w-6 h-6"></i><span class="text-[10px]">ลูกค้า</span><span id="pending-badge" class="absolute -top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view shadow-md">0</span></button>
            <button onclick="renderAdminShop()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-shop"><i data-lucide="store" class="w-6 h-6"></i><span class="text-[10px]">จัดการ</span></button>
            <button onclick="renderAdminChatList()" class="flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-chat"><i data-lucide="message-circle" class="w-6 h-6"></i><span class="text-[10px]">แชท</span></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==================== INITIAL DATA ====================
        let db = {
            users: [
                { id: 'u1', username: 'berbar', password: '1234', fname: 'เจ้าของร้าน', nname: 'Admin', phone: '000', role: 'admin', status: 'approved' },
                { id: 'u2', username: 'user1', password: '1234', fname: 'สมชาย', nname: 'ชาย', phone: '0812345678', role: 'user', status: 'approved' }
            ],
            shopInfo: { open: '10:00', close: '20:00', notice: 'กรุณามาก่อนเวลาจอง สัก 5-10 นาทีนะครับ' },
            barbers: [
                { id: 'b1', name: 'ช่างอาร์ท (Master)', status: 'available' },
                { id: 'b2', name: 'ช่างบอย (Fade Specialist)', status: 'busy' }
            ],
            services: [
                { id: 's1', name: 'Premium Haircut', desc: 'ตัดผม + เซ็ตทรงมาตรฐาน', price: 500, type: 'service', image: 'https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=300&q=80' },
                { id: 's2', name: 'Skin Fade Haircut', desc: 'เฟดไล่ระดับสไตล์โมเดิร์น', price: 600, type: 'service', image: 'https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&w=300&q=80' }
            ],
            products: [
                { id: 'p1', name: 'Pomade Suavecito', desc: 'โพเมดเซ็ตผม พลังเกาะแน่น', price: 650, type: 'product', image: 'https://images.unsplash.com/photo-1597854710119-a0a41d6b05eb?auto=format&fit=crop&w=300&q=80' }
            ],
            transactions: [],
            messages: [] 
        };

        let localCart = [];
        let currentUser = null;
        let isFirebaseReady = false;
        let stateDocRef = null;
        let currentAdminChatUserId = null;

        // ==================== THEME MANAGEMENT ====================
        window.toggleTheme = () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeIcons();
        };

        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            const iconNav = document.getElementById('theme-icon-nav');
            const iconAuth = document.getElementById('theme-icon-auth');
            if(iconNav) iconNav.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            if(iconAuth) iconAuth.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // ==================== FIREBASE SETUP ====================
        async function setupFirebase() {
            try {
                let firebaseConfig;
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                } else {
                    lucide.createIcons(); updateThemeIcons(); checkAutoLogin(); return; 
                }

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const firestore = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-barber-app';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        stateDocRef = doc(firestore, 'artifacts', appId, 'public', 'data', 'appState', 'mainDb');
                        const snap = await getDoc(stateDocRef);
                        if (!snap.exists()) await setDoc(stateDocRef, db); 
                        
                        onSnapshot(stateDocRef, (docSnap) => {
                            if (docSnap.exists()) { 
                                db = docSnap.data(); 
                                if(!db.messages) db.messages = []; 
                                refreshCurrentView(); 
                            }
                        });
                        isFirebaseReady = true;
                        checkAutoLogin(); 
                    }
                });
            } catch (error) { console.error("Firebase Error:", error); }
        }
        setupFirebase();

        async function syncData() { if (isFirebaseReady && stateDocRef) await setDoc(stateDocRef, db); }

        function checkAutoLogin() {
            const savedUid = localStorage.getItem('gentleman_saved_uid');
            if (savedUid) {
                const user = db.users.find(u => u.id === savedUid);
                if (user) { currentUser = user; checkUserStatus(); }
            }
        }

        // ==================== UTILS ====================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-icon').setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'check-circle');
            toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] flex items-center gap-3 text-sm font-medium glass-panel transition-opacity duration-300 ${type === 'error' ? 'border-red-500 text-red-600 dark:text-red-400' : 'border-gold-500 text-gold-600 dark:text-gold-400'}`;
            document.getElementById('toast-message').textContent = message;
            lucide.createIcons(); toast.classList.remove('hidden-view');
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.classList.add('hidden-view'), 300); }, 3000);
        }

        function formatMoney(num) { return new Intl.NumberFormat('th-TH').format(num) + ' ฿'; }
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        function formatTime(isoString) { const d = new Date(isoString); return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0'); }

        window._pendingConfirmAction = null;
        window.showConfirm = (msg, action) => { document.getElementById('confirm-message').textContent = msg; window._pendingConfirmAction = action; document.getElementById('confirm-modal').classList.remove('hidden-view'); setTimeout(() => document.getElementById('confirm-modal').style.opacity = '1', 10); };
        window.closeConfirm = () => { document.getElementById('confirm-modal').style.opacity = '0'; setTimeout(() => { document.getElementById('confirm-modal').classList.add('hidden-view'); window._pendingConfirmAction = null; }, 300); };
        window.executeConfirm = async () => { if(window._pendingConfirmAction) await window._pendingConfirmAction(); window.closeConfirm(); };

        function refreshCurrentView() {
            if (!currentUser) return;
            const freshUser = db.users.find(u => u.id === currentUser.id);
            if (!freshUser) { window.logout(); return; }
            currentUser = freshUser;

            if (currentUser.status === 'pending') { checkUserStatus(); return; }
            if (currentUser.role === 'admin') {
                updateAdminBadges();
                if(!document.getElementById('nav-admin-dash').classList.contains('text-gray-400') && !document.getElementById('nav-admin-dash').classList.contains('text-gray-500')) window.renderAdminDashboard();
                if(!document.getElementById('nav-admin-users').classList.contains('text-gray-400') && !document.getElementById('nav-admin-users').classList.contains('text-gray-500')) window.renderAdminUsers();
                if(!document.getElementById('nav-admin-shop').classList.contains('text-gray-400') && !document.getElementById('nav-admin-shop').classList.contains('text-gray-500')) window.renderAdminShop();
                if(!document.getElementById('nav-admin-chat').classList.contains('text-gray-400') && !document.getElementById('nav-admin-chat').classList.contains('text-gray-500')) {
                    if(currentAdminChatUserId) window.renderAdminChatRoom(currentAdminChatUserId); else window.renderAdminChatList();
                }
            } else {
                if(!document.getElementById('nav-home').classList.contains('text-gray-400') && !document.getElementById('nav-home').classList.contains('text-gray-500')) window.renderCustomerHome();
                if(!document.getElementById('nav-history').classList.contains('text-gray-400') && !document.getElementById('nav-history').classList.contains('text-gray-500')) window.renderHistory();
                if(!document.getElementById('nav-chat').classList.contains('text-gray-400') && !document.getElementById('nav-chat').classList.contains('text-gray-500')) window.renderCustomerChat();
            }
        }

        window.switchAuthTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active', 'text-gray-900', 'dark:text-white'); btn.classList.add('text-gray-500'); });

            setActiveNav('nav-history'); const myTxs = db.transactions.filter(t => t.userId === currentUser.id);
            if(myTxs.length === 0) { document.getElementById('main-content').innerHTML = `<div class="p-8 text-center text-gray-500 mt-20">ไม่มีประวัติ</div>`; return; }
            document.getElementById('main-content').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4 text-gray-900 dark:text-white">ประวัติ</h2>` + myTxs.map(tx => `<div class="glass-panel p-4 rounded-xl mb-4"><div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-2 mb-2"><span class="text-xs font-medium text-gray-500">${new Date(tx.createdAt).toLocaleDateString('th-TH')}</span><span class="text-xs font-bold text-gold-600 dark:text-gold-500">${tx.id}</span></div>${tx.booking ? `<div class="mb-3 bg-gray-50 dark:bg-dark-800/50 p-3 rounded-lg border border-gray-100 dark:border-transparent text-sm"><p class="text-gray-900 dark:text-white font-medium"><i data-lucide="calendar" class="w-4 h-4 inline text-gold-500 mr-1 mb-0.5"></i> ${tx.booking.date} เวลา ${tx.booking.time}</p><p class="text-gray-500 dark:text-gray-400 text-xs mt-1">ช่าง: ${tx.booking.barberName}</p></div>` : ''}<div class="space-y-1 mb-3">${tx.items.map(i => `<div class="flex justify-between text-sm"><span class="text-gray-700 dark:text-gray-300">- ${i.name}</span><span class="text-gray-500 font-medium">${formatMoney(i.price)}</span></div>`).join('')}</div><div class="flex justify-between pt-3 border-t border-gray-200 dark:border-gray-800"><span class="text-xs text-gray-500 bg-gray-100 dark:bg-dark-800 px-2 py-1 rounded">ชำระ: ${tx.payment}</span><span class="font-bold text-gold-600 dark:text-gold-500">${formatMoney(tx.total)}</span></div></div>`).join('') + `</div>`; lucide.createIcons();
        };

        // ADMIN VIEWS
        function updateAdminBadges() { const c = db.users.filter(u => u.status === 'pending').length; const b = document.getElementById('pending-badge'); if(c>0) { b.textContent = c; b.classList.remove('hidden-view'); } else b.classList.add('hidden-view'); }
        
        window.renderAdminDashboard = () => {
            setActiveNav('nav-admin-dash', 'nav-item-admin'); const tr = db.transactions.reduce((s, tx) => s + tx.total, 0), tb = db.transactions.filter(tx => tx.booking).length;
            let txs = db.transactions.slice(0, 10).map(tx => `<div class="bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 border border-gray-200 dark:border-gray-700 flex justify-between items-center shadow-sm"><div><p class="text-sm font-bold text-gray-900 dark:text-white">${tx.userName}</p><p class="text-[10px] text-gray-500">${tx.booking ? `จอง: ${tx.booking.date}` : 'ซื้อสินค้า'}</p></div><div class="flex items-center gap-3"><p class="text-sm font-bold text-gold-600 dark:text-gold-500">+${formatMoney(tx.total)}</p><button onclick="deleteTransaction('${tx.id}')" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-500/20 p-2 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('') || '<p class="text-center text-sm text-gray-500">ไม่มีรายการ</p>';
            document.getElementById('main-content').innerHTML = `<div class="p-4 space-y-4"><h2 class="text-xl font-bold mb-2 text-gray-900 dark:text-white">ภาพรวม</h2><div class="grid grid-cols-2 gap-3"><div class="glass-panel p-4 rounded-2xl border-l-4 border-gold-500"><p class="text-xs text-gray-500 dark:text-gray-400 mb-1">รายได้</p><p class="text-xl font-bold text-gray-900 dark:text-white">${formatMoney(tr)}</p></div><div class="glass-panel p-4 rounded-2xl border-l-4 border-blue-500"><p class="text-xs text-gray-500 dark:text-gray-400 mb-1">คิว</p><p class="text-xl font-bold text-gray-900 dark:text-white">${tb}</p></div></div><div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4"></i> ล่าสุด</h3>${txs}</div></div>`; lucide.createIcons();
        };

        window.renderAdminUsers = () => {
            setActiveNav('nav-admin-users', 'nav-item-admin'); const pending = db.users.filter(u => u.status === 'pending'), app = db.users.filter(u => u.status === 'approved' && u.role !== 'admin');
            let pHTML = pending.map(u => `<div class="bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 border border-yellow-300 dark:border-yellow-500/30 flex justify-between items-center shadow-sm"><div><p class="text-sm font-bold text-gray-900 dark:text-white">${u.fname}</p><p class="text-xs text-gray-500">User: ${u.username}</p></div><button onclick="approveUser('${u.id}')" class="bg-gold-500 text-black px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">อนุมัติ</button></div>`).join('') || '<p class="text-sm text-gray-500">ไม่มีผู้ใช้รออนุมัติ</p>';
            document.getElementById('main-content').innerHTML = `<div class="p-4 space-y-6"><div><h3 class="text-sm font-bold text-yellow-600 dark:text-yellow-500 mb-3 flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i> รออนุมัติ (${pending.length})</h3>${pHTML}</div><div><h3 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-3">ลูกค้าทั้งหมด (${app.length})</h3>${app.map(u => `<div class="bg-gray-50 dark:bg-dark-800/50 p-3 rounded-lg mb-2 border border-gray-100 dark:border-transparent"><p class="text-sm text-gray-900 dark:text-white font-medium">${u.fname}</p><p class="text-xs text-gray-500">${u.phone}</p></div>`).join('')}</div></div>`; lucide.createIcons();
        };

        window.approveUser = async (id) => { const u = db.users.find(u => u.id === id); if(u) { u.status = 'approved'; updateAdminBadges(); window.renderAdminUsers(); await syncData(); showToast('อนุมัติสำเร็จ'); } };

        window.renderAdminShop = () => {
            setActiveNav('nav-admin-shop', 'nav-item-admin');
            let bHTML = db.barbers.map(b => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 border border-gray-200 dark:border-gray-700 shadow-sm"><span class="text-sm font-medium text-gray-900 dark:text-white">${b.name}</span><button onclick="toggleBarberStatus('${b.id}')" class="px-3 py-1 rounded-lg text-xs font-bold transition ${b.status === 'available' ? 'bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-400'}">${b.status === 'available' ? 'ว่าง' : 'ติดลูกค้า'}</button></div>`).join('');
            let sHTML = db.services.map(s => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 border border-gray-200 dark:border-gray-700 shadow-sm"><div><p class="text-sm font-medium text-gray-900 dark:text-white">${s.name}</p><p class="text-xs text-gold-600 dark:text-gold-500 font-medium">${formatMoney(s.price)}</p></div><button onclick="deleteItem('service', '${s.id}')" class="text-red-500 p-2 bg-red-50 dark:bg-transparent dark:hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            let pHTML = db.products.map(p => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 border border-gray-200 dark:border-gray-700 shadow-sm"><div><p class="text-sm font-medium text-gray-900 dark:text-white">${p.name}</p><p class="text-xs text-gold-600 dark:text-gold-500 font-medium">${formatMoney(p.price)}</p></div><button onclick="deleteItem('product', '${p.id}')" class="text-red-500 p-2 bg-red-50 dark:bg-transparent dark:hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');

            document.getElementById('main-content').innerHTML = `
                <div class="p-4 space-y-6">
                    <div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="user-check" class="w-4 h-4 text-gold-500"></i> สถานะช่าง</h3>${bHTML}</div>
                    <div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="scissors" class="w-4 h-4 text-gold-500"></i> บริการ</h3>${sHTML}<h3 class="text-sm font-bold mt-6 mb-3 text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="package" class="w-4 h-4 text-gold-500"></i> สินค้า</h3>${pHTML}
                        <form onsubmit="addItem(event)" class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 space-y-3">
                            <h4 class="text-xs font-bold text-gray-500 uppercase">เพิ่มรายการใหม่</h4>
                            <select id="add-type" class="input-premium py-2.5 text-sm appearance-none"><option value="service">บริการ/ทรงผม</option><option value="product">สินค้า</option></select>
                            <input type="text" id="add-name" placeholder="ชื่อรายการ" class="input-premium py-2.5 text-sm" required>
                            <input type="number" id="add-price" placeholder="ราคา (บาท)" class="input-premium py-2.5 text-sm" required>
                            <button type="submit" class="bg-gray-900 dark:bg-white text-white dark:text-black rounded-xl px-4 py-3 w-full font-bold shadow-md">บันทึกรายการ</button>
                        </form>
                    </div></div>`; lucide.createIcons();
        };

        window.toggleBarberStatus = async (id) => { const b = db.barbers.find(x => x.id === id); if(b) { b.status = b.status === 'available' ? 'busy' : 'available'; window.renderAdminShop(); await syncData(); } };
        window.deleteItem = (type, id) => { window.showConfirm(`ลบรายการนี้?`, async () => { if(type === 'service') db.services = db.services.filter(s => s.id !== id); if(type === 'product') db.products = db.products.filter(p => p.id !== id); window.renderAdminShop(); await syncData(); showToast('ลบสำเร็จ'); }); };
        window.deleteTransaction = (id) => { window.showConfirm('ลบรายการนี้?', async () => { db.transactions = db.transactions.filter(t => t.id !== id); window.renderAdminDashboard(); await syncData(); showToast('ลบสำเร็จ'); }); };
        window.addItem = async (e) => { e.preventDefault(); const t = document.getElementById('add-type').value; const i = { id: (t==='service'?'s':'p')+generateId(), name: document.getElementById('add-name').value, desc: 'เพิ่มโดยแอดมิน', price: parseInt(document.getElementById('add-price').value), type: t }; if(t==='service') db.services.push(i); else db.products.push(i); window.renderAdminShop(); await syncData(); showToast('เพิ่มสำเร็จ'); };

        document.getElementById('view-auth').classList.remove('hidden-view'); lucide.createIcons(); updateThemeIcons();
    </script>
</body>
</html>
