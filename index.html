<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gentleman - Advanced Barber System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#050505', 800: '#121212', 700: '#1e1e1e' },
                        gold: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' }
                    },
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #050505; color: #f3f4f6; -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #eab308; }

        .hidden-view { display: none !important; }

        .input-premium {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white;
            padding: 0.75rem 1rem; border-radius: 0.75rem; transition: all 0.3s ease;
        }
        .input-premium:focus { outline: none; border-color: #eab308; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }

        .tab-btn.active { border-bottom: 2px solid #eab308; color: #eab308; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-available { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-busy { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .img-fallback { background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; }

        /* Chat bubbles */
        .chat-bubble-me { background: #eab308; color: #000; border-radius: 1rem 1rem 0 1rem; }
        .chat-bubble-other { background: #1e1e1e; color: #fff; border-radius: 1rem 1rem 1rem 0; border: 1px solid #333; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-20">

    <!-- Toast & Modals -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] hidden-view opacity-0 transition-opacity duration-300 flex items-center gap-3 text-sm font-medium glass-panel border-gray-700">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i><span id="toast-message"></span>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-2xl max-w-sm w-full mx-4 gold-glow border border-gray-700 text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/30"><i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i></div>
            <h3 class="text-xl font-bold mb-2 text-white">ยืนยันการทำรายการ</h3>
            <p id="confirm-message" class="text-gray-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl border border-gray-600 hover:bg-gray-800 transition text-sm font-medium">ยกเลิก</button>
                <button onclick="executeConfirm()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-500 transition shadow-[0_0_15px_rgba(239,68,68,0.4)] text-sm">ยืนยัน</button>
            </div>
        </div>
    </div>

    <!-- ==================== AUTHENTICATION VIEW ==================== -->
    <main id="view-auth" class="flex-grow container mx-auto px-4 flex flex-col items-center justify-center min-h-screen relative overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-yellow-600/20 rounded-full blur-[100px] -z-10"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px] -z-10"></div>

        <div class="w-full max-w-md glass-panel rounded-3xl p-8 gold-glow relative">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto bg-dark-800 rounded-full border border-gold-500 flex items-center justify-center mb-4 shadow-[0_0_25px_rgba(234,179,8,0.3)]"><i data-lucide="scissors" class="w-10 h-10 text-gold-500"></i></div>
                <h1 class="text-3xl font-bold tracking-wider text-white">THE <span class="text-gold-500">GENTLEMAN</span></h1>
                <p class="text-gray-400 text-sm mt-2">Premium Barber & Shop</p>
            </div>

            <div class="flex border-b border-gray-700 mb-6">
                <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-3 text-sm font-medium tab-btn active">เข้าสู่ระบบ</button>
                <button onclick="switchAuthTab('register')" id="tab-register" class="flex-1 py-3 text-sm font-medium text-gray-500 tab-btn">สมัครสมาชิก</button>
            </div>

            <form id="form-login" class="space-y-4" onsubmit="handleLogin(event)">
                <input type="text" id="login-username" required class="input-premium" placeholder="Username (เช่น berbar)">
                <input type="password" id="login-password" required class="input-premium" placeholder="รหัสผ่าน (เช่น 1234)">
                
                <!-- เช็คบ็อกซ์จำรหัสผ่าน -->
                <div class="flex items-center gap-2 mt-2 px-1">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 accent-gold-500 rounded bg-dark-800 border-gray-700">
                    <label for="remember-me" class="text-sm text-gray-400 cursor-pointer">จำการเข้าสู่ระบบไว้ในเครื่องนี้</label>
                </div>

                <button type="submit" class="w-full bg-gold-500 text-black font-bold py-3.5 rounded-xl hover:bg-gold-400 transition mt-4">เข้าสู่ระบบ</button>
            </form>

            <form id="form-register" class="space-y-4 hidden-view" onsubmit="handleRegister(event)">
                <div class="grid grid-cols-2 gap-3"><input type="text" id="reg-fname" required class="input-premium" placeholder="ชื่อจริง"><input type="text" id="reg-nname" required class="input-premium" placeholder="ชื่อเล่น"></div>
                <input type="tel" id="reg-phone" required class="input-premium" placeholder="เบอร์โทรศัพท์">
                <input type="text" id="reg-username" required class="input-premium" placeholder="Username">
                <input type="password" id="reg-password" required class="input-premium" placeholder="ตั้งรหัสผ่าน">
                <button type="submit" class="w-full bg-dark-700 text-white font-bold py-3.5 rounded-xl hover:bg-dark-600 border border-gray-600 transition mt-4">สมัครสมาชิก</button>
            </form>
        </div>
    </main>

    <!-- ==================== PENDING APPROVAL VIEW ==================== -->
    <main id="view-pending" class="hidden-view flex-grow container mx-auto px-4 flex flex-col items-center justify-center min-h-screen text-center">
        <i data-lucide="clock" class="w-20 h-20 text-gold-500 mb-6 animate-pulse-slow"></i><h2 class="text-2xl font-bold mb-2">รอการอนุมัติ</h2>
        <p class="text-gray-400 mb-8 max-w-sm">บัญชีของคุณกำลังรอการตรวจสอบจากเจ้าของร้าน<br>ระบบจะอัปเดตอัตโนมัติเมื่อได้รับการอนุมัติ</p>
        <button onclick="logout()" class="px-6 py-2 border border-gray-600 rounded-full text-sm hover:bg-gray-800 transition">ออกจากระบบ</button>
    </main>

    <!-- ==================== MAIN APP SHELL ==================== -->
    <div id="app-shell" class="hidden-view flex flex-col min-h-screen">
        <nav class="glass-panel sticky top-0 z-40 border-b-0 border-gold-500/20">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gold-500 rounded flex items-center justify-center text-black"><i data-lucide="scissors" class="w-5 h-5"></i></div>
                    <span class="font-bold tracking-widest text-lg">THE GENTLEMAN</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-display-name" class="text-sm text-gray-300"></span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 p-1 bg-red-500/10 rounded-lg" title="ออกจากระบบ"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                </div>
            </div>
        </nav>

        <div id="main-content" class="flex-grow pb-24"></div>

        <!-- Navigation (Customer) - 4 Items -->
        <div id="bottom-nav" class="fixed bottom-0 w-full glass-panel border-t border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderCustomerHome()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 nav-item" id="nav-home">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px]">หน้าหลัก</span>
            </button>
            <button onclick="renderCart()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 relative nav-item" id="nav-cart">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i><span class="text-[10px]">ตะกร้า</span><span id="cart-badge" class="absolute -top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view">0</span>
            </button>
            <button onclick="renderHistory()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 nav-item" id="nav-history">
                <i data-lucide="clock-4" class="w-6 h-6"></i><span class="text-[10px]">ประวัติ</span>
            </button>
            <!-- เมนูแชทลูกค้า -->
            <button onclick="renderCustomerChat()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 relative nav-item" id="nav-chat">
                <i data-lucide="message-square" class="w-6 h-6"></i><span class="text-[10px]">ข้อความ</span>
            </button>
        </div>

        <!-- Navigation (Admin) - 4 Items -->
        <div id="admin-bottom-nav" class="fixed bottom-0 w-full glass-panel border-t border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderAdminDashboard()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-dash">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="text-[10px]">ภาพรวม</span>
            </button>
            <button onclick="renderAdminUsers()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 relative nav-item-admin" id="nav-admin-users">
                <i data-lucide="users" class="w-6 h-6"></i><span class="text-[10px]">ลูกค้า</span><span id="pending-badge" class="absolute -top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view">0</span>
            </button>
            <button onclick="renderAdminShop()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-shop">
                <i data-lucide="store" class="w-6 h-6"></i><span class="text-[10px]">จัดการ</span>
            </button>
            <!-- เมนูแชทแอดมิน -->
            <button onclick="renderAdminChatList()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gold-500 w-1/4 nav-item-admin" id="nav-admin-chat">
                <i data-lucide="message-circle" class="w-6 h-6"></i><span class="text-[10px]">แชท</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==================== INITIAL DATA (Added Messages Array) ====================
        let db = {
            users: [
                { id: 'u1', username: 'berbar', password: '1234', fname: 'เจ้าของร้าน', nname: 'Admin', phone: '000', role: 'admin', status: 'approved' },
                { id: 'u2', username: 'user1', password: '1234', fname: 'สมชาย', nname: 'ชาย', phone: '0812345678', role: 'user', status: 'approved' }
            ],
            shopInfo: { open: '10:00', close: '20:00', notice: 'กรุณามาก่อนเวลาจอง สัก 5-10 นาทีนะครับ' },
            barbers: [
                { id: 'b1', name: 'ช่างอาร์ท (Master)', status: 'available' },
                { id: 'b2', name: 'ช่างบอย (Fade Specialist)', status: 'busy' }
            ],
            services: [
                { id: 's1', name: 'Premium Haircut', desc: 'ตัดผม + เซ็ตทรงมาตรฐาน', price: 500, type: 'service', image: 'https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=300&q=80' },
                { id: 's2', name: 'Skin Fade Haircut', desc: 'เฟดไล่ระดับสไตล์โมเดิร์น', price: 600, type: 'service', image: 'https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&w=300&q=80' }
            ],
            products: [
                { id: 'p1', name: 'Pomade Suavecito', desc: 'โพเมดเซ็ตผม พลังเกาะแน่น', price: 650, type: 'product', image: 'https://images.unsplash.com/photo-1597854710119-a0a41d6b05eb?auto=format&fit=crop&w=300&q=80' }
            ],
            transactions: [],
            messages: [ // โครงสร้างข้อความแชท
                // ตัวอย่าง: { id: 'm1', userId: 'u2', senderId: 'u2', text: 'สวัสดีครับ', timestamp: '...' }
            ] 
        };

        let localCart = [];
        let currentUser = null;
        let isFirebaseReady = false;
        let stateDocRef = null;
        let currentAdminChatUserId = null; // State สำหรับจำว่าแอดมินกำลังคุยกับใครอยู่

        // ==================== FIREBASE SETUP ====================
        async function setupFirebase() {
            try {
                let firebaseConfig;
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                } else {
                    console.warn("⚠️ รันแบบ Offline");
                    lucide.createIcons(); checkAutoLogin(); return; 
                }

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const firestore = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-barber-app';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        stateDocRef = doc(firestore, 'artifacts', appId, 'public', 'data', 'appState', 'mainDb');
                        const snap = await getDoc(stateDocRef);
                        if (!snap.exists()) await setDoc(stateDocRef, db); 
                        
                        onSnapshot(stateDocRef, (docSnap) => {
                            if (docSnap.exists()) { 
                                db = docSnap.data(); 
                                if(!db.messages) db.messages = []; // Safety check
                                refreshCurrentView(); 
                            }
                        });
                        isFirebaseReady = true;
                        checkAutoLogin(); // ตรวจสอบรหัสที่บันทึกไว้หลังจากต่อ DB ติดแล้ว
                    }
                });
            } catch (error) { console.error("Firebase Error:", error); }
        }
        setupFirebase();

        async function syncData() { if (isFirebaseReady && stateDocRef) await setDoc(stateDocRef, db); }

        // ==================== AUTO LOGIN LOGIC ====================
        function checkAutoLogin() {
            const savedUid = localStorage.getItem('gentleman_saved_uid');
            if (savedUid) {
                const user = db.users.find(u => u.id === savedUid);
                if (user) {
                    currentUser = user;
                    checkUserStatus();
                    showToast('เข้าสู่ระบบอัตโนมัติ', 'success');
                }
            }
        }

        // ==================== UTILS ====================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-icon').setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'check-circle');
            toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] flex items-center gap-3 text-sm font-medium glass-panel transition-opacity duration-300 ${type === 'error' ? 'border-red-500 text-red-400' : 'border-gold-500 text-gold-400'}`;
            document.getElementById('toast-message').textContent = message;
            lucide.createIcons();
            toast.classList.remove('hidden-view');
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.classList.add('hidden-view'), 300); }, 3000);
        }

        function formatMoney(num) { return new Intl.NumberFormat('th-TH').format(num) + ' ฿'; }
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        function formatTime(isoString) {
            const d = new Date(isoString);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        window._pendingConfirmAction = null;
        window.showConfirm = (msg, action) => {
            document.getElementById('confirm-message').textContent = msg; window._pendingConfirmAction = action;
            document.getElementById('confirm-modal').classList.remove('hidden-view'); setTimeout(() => document.getElementById('confirm-modal').style.opacity = '1', 10);
        };
        window.closeConfirm = () => {
            document.getElementById('confirm-modal').style.opacity = '0'; setTimeout(() => { document.getElementById('confirm-modal').classList.add('hidden-view'); window._pendingConfirmAction = null; }, 300);
        };
        window.executeConfirm = async () => { if(window._pendingConfirmAction) await window._pendingConfirmAction(); window.closeConfirm(); };

        function refreshCurrentView() {
            if (!currentUser) return;
            const freshUser = db.users.find(u => u.id === currentUser.id);
            if (!freshUser) { window.logout(); return; }
            currentUser = freshUser;

            if (currentUser.status === 'pending') { checkUserStatus(); return; }
            if (currentUser.role === 'admin') {
                updateAdminBadges();
                if(!document.getElementById('nav-admin-dash').classList.contains('text-gray-400')) window.renderAdminDashboard();
                if(!document.getElementById('nav-admin-users').classList.contains('text-gray-400')) window.renderAdminUsers();
                if(!document.getElementById('nav-admin-shop').classList.contains('text-gray-400')) window.renderAdminShop();
                if(!document.getElementById('nav-admin-chat').classList.contains('text-gray-400')) {
                    if(currentAdminChatUserId) window.renderAdminChatRoom(currentAdminChatUserId);
                    else window.renderAdminChatList();
                }
            } else {
                if(!document.getElementById('nav-home').classList.contains('text-gray-400')) window.renderCustomerHome();
                if(!document.getElementById('nav-history').classList.contains('text-gray-400')) window.renderHistory();
                if(!document.getElementById('nav-chat').classList.contains('text-gray-400')) window.renderCustomerChat();
            }
        }

        window.switchAuthTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active', 'text-white'); btn.classList.add('text-gray-500'); });
            document.getElementById(`tab-${tab}`).classList.add('active', 'text-white');
            document.getElementById(`form-login`).classList.add('hidden-view'); document.getElementById(`form-register`).classList.add('hidden-view');
            document.getElementById(`form-${tab}`).classList.remove('hidden-view');
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value, p = document.getElementById('login-password').value;
            const remember = document.getElementById('remember-me').checked;
            const user = db.users.find(x => x.username === u && x.password === p);
            
            if(user) { 
                currentUser = user; 
                if(remember) localStorage.setItem('gentleman_saved_uid', user.id);
                else localStorage.removeItem('gentleman_saved_uid');
                checkUserStatus(); 
            } else {
                showToast('Username หรือ Password ไม่ถูกต้อง', 'error');
            }
        };

        window.handleRegister = async (e) => {
            e.preventDefault();
            const newUser = {
                id: 'u_' + generateId(), fname: document.getElementById('reg-fname').value, nname: document.getElementById('reg-nname').value,
                phone: document.getElementById('reg-phone').value, username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value, role: 'user', status: 'pending'
            };
            if(db.users.find(x => x.username === newUser.username)) return showToast('Username นี้มีคนใช้แล้ว', 'error');
            db.users.push(newUser); currentUser = newUser; await syncData(); checkUserStatus(); showToast('สมัครสำเร็จ รอการอนุมัติ');
        };

        window.logout = () => {
            currentUser = null; localCart = []; currentAdminChatUserId = null;
            localStorage.removeItem('gentleman_saved_uid'); // ล้างรหัสผ่านที่จำไว้
            document.getElementById('view-auth').classList.remove('hidden-view'); document.getElementById('view-pending').classList.add('hidden-view'); document.getElementById('app-shell').classList.add('hidden-view');
            document.getElementById('form-login').reset(); document.getElementById('form-register').reset(); window.switchAuthTab('login');
        };

        function checkUserStatus() {
            document.getElementById('view-auth').classList.add('hidden-view');
            if(currentUser.status === 'pending') {
                document.getElementById('view-pending').classList.remove('hidden-view'); document.getElementById('app-shell').classList.add('hidden-view');
            } else {
                document.getElementById('view-pending').classList.add('hidden-view'); document.getElementById('app-shell').classList.remove('hidden-view');
                document.getElementById('user-display-name').textContent = `คุณ${currentUser.nname}`;
                if(currentUser.role === 'admin') {
                    document.getElementById('bottom-nav').classList.add('hidden-view'); document.getElementById('admin-bottom-nav').classList.remove('hidden-view');
                    window.renderAdminDashboard(); updateAdminBadges();
                } else {
                    document.getElementById('admin-bottom-nav').classList.add('hidden-view'); document.getElementById('bottom-nav').classList.remove('hidden-view');
                    window.renderCustomerHome(); updateCartBadge();
                }
            }
        }

            document.getElementById('main-content').innerHTML = `<div class="p-4 space-y-6"><div><h3 class="text-sm font-bold text-yellow-500 mb-3 flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i> รออนุมัติ (${pending.length})</h3>${pHTML}</div><div><h3 class="text-sm font-bold text-gray-400 mb-3">ลูกค้าทั้งหมด (${app.length})</h3>${app.map(u => `<div class="bg-dark-800/50 p-3 rounded-lg mb-2"><p class="text-sm">${u.fname}</p><p class="text-xs text-gray-500">${u.phone}</p></div>`).join('')}</div></div>`;
            lucide.createIcons();
        };

        window.approveUser = async (id) => { const u = db.users.find(u => u.id === id); if(u) { u.status = 'approved'; updateAdminBadges(); window.renderAdminUsers(); await syncData(); showToast('อนุมัติสำเร็จ'); } };

        window.renderAdminShop = () => {
            setActiveNav('nav-admin-shop', 'nav-item-admin');
            let bHTML = db.barbers.map(b => `<div class="flex justify-between items-center bg-dark-800 p-3 rounded-lg mb-2 border border-gray-700"><span class="text-sm text-white">${b.name}</span><button onclick="toggleBarberStatus('${b.id}')" class="px-3 py-1 rounded text-xs font-bold ${b.status === 'available' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${b.status === 'available' ? 'ว่าง' : 'ติดลูกค้า'}</button></div>`).join('');
            let sHTML = db.services.map(s => `<div class="flex justify-between items-center bg-dark-800 p-3 rounded-lg border border-gray-700 mb-2"><div><p class="text-sm text-white">${s.name}</p></div><button onclick="deleteItem('service', '${s.id}')" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            let pHTML = db.products.map(p => `<div class="flex justify-between items-center bg-dark-800 p-3 rounded-lg border border-gray-700 mb-2"><div><p class="text-sm text-white">${p.name}</p></div><button onclick="deleteItem('product', '${p.id}')" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');

            document.getElementById('main-content').innerHTML = `
                <div class="p-4 space-y-6">
                    <div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 text-white">สถานะช่าง</h3>${bHTML}</div>
                    <div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 text-white">บริการ</h3>${sHTML}<h3 class="text-sm font-bold mt-6 mb-3 text-white">สินค้า</h3>${pHTML}
                        <form onsubmit="addItem(event)" class="mt-4 pt-4 border-t border-gray-700 space-y-2">
                            <select id="add-type" class="input-premium py-2 text-sm appearance-none"><option value="service">บริการ</option><option value="product">สินค้า</option></select>
                            <input type="text" id="add-name" placeholder="ชื่อ" class="input-premium py-2 text-sm" required>
                            <input type="number" id="add-price" placeholder="ราคา" class="input-premium py-2 text-sm" required>
                            <button type="submit" class="bg-gold-500 text-black rounded-xl px-4 py-2 w-full font-bold">เพิ่ม</button>
                        </form>
                    </div>
                </div>`;
            lucide.createIcons();
        };

        window.toggleBarberStatus = async (id) => { const b = db.barbers.find(x => x.id === id); if(b) { b.status = b.status === 'available' ? 'busy' : 'available'; window.renderAdminShop(); await syncData(); } };
        window.deleteItem = (type, id) => { window.showConfirm(`ลบรายการนี้?`, async () => { if(type === 'service') db.services = db.services.filter(s => s.id !== id); if(type === 'product') db.products = db.products.filter(p => p.id !== id); window.renderAdminShop(); await syncData(); showToast('ลบสำเร็จ'); }); };
        window.deleteTransaction = (id) => { window.showConfirm('ลบรายการนี้?', async () => { db.transactions = db.transactions.filter(t => t.id !== id); window.renderAdminDashboard(); await syncData(); showToast('ลบสำเร็จ'); }); };
        window.addItem = async (e) => { e.preventDefault(); const t = document.getElementById('add-type').value; const i = { id: (t==='service'?'s':'p')+generateId(), name: document.getElementById('add-name').value, desc: 'เพิ่มโดยแอดมิน', price: parseInt(document.getElementById('add-price').value), type: t }; if(t==='service') db.services.push(i); else db.products.push(i); window.renderAdminShop(); await syncData(); showToast('เพิ่มสำเร็จ'); };

        document.getElementById('view-auth').classList.remove('hidden-view'); lucide.createIcons();
    </script>
</body>
</html>
