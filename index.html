<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barber Hub - ศูนย์รวมร้านตัดผม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) { 
            document.documentElement.classList.remove('dark'); 
        } else { 
            document.documentElement.classList.add('dark'); 
        }
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { 900: '#050505', 800: '#121212', 700: '#1e1e1e' }, gold: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' } }, fontFamily: { sans: ['Prompt', 'sans-serif'] } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .dark .glass-panel { background: rgba(30, 30, 30, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; } .dark ::-webkit-scrollbar-thumb { background: #444; }
        .hidden-view { display: none !important; }
        .input-premium { width: 100%; background: #ffffff; border: 1px solid #e5e7eb; color: #111827; padding: 0.75rem 1rem; border-radius: 0.75rem; transition: all 0.3s; }
        .dark .input-premium { background: rgba(0,0,0,0.4); border: 1px solid #333; color: white; }
        .input-premium:focus { outline: none; border-color: #eab308; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }
        .tab-btn.active { border-bottom: 2px solid #eab308; color: #eab308; font-weight: bold; }
        .img-fallback { background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; }
        .dark .img-fallback { background-color: #1a1a1a; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-available { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .status-busy { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .chat-me { background: #eab308; color: #000; border-radius: 1rem 1rem 0 1rem; }
        .chat-other { background: #f3f4f6; color: #111827; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e5e7eb; }
        .dark .chat-other { background: #1e1e1e; color: #fff; border: 1px solid #333; }
        
        @media print {
            body * { visibility: hidden; }
            #printable-receipt, #printable-receipt * { visibility: visible; }
            #printable-receipt { position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; margin: 0; color: black !important; background: white !important; font-family: monospace; padding: 10px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-20 bg-gray-50 text-gray-900 dark:bg-[#050505] dark:text-gray-100 transition-colors duration-300">

    <!-- GLOBAL UI COMPONENTS -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[100] hidden-view opacity-0 transition-opacity duration-300 flex items-center gap-3 text-sm font-medium glass-panel">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i><span id="toast-message" class="text-gray-900 dark:text-white"></span>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/60 dark:bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 p-4">
        <div class="glass-panel p-6 rounded-2xl max-w-sm w-full gold-glow text-center">
            <div class="w-16 h-16 bg-red-100 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-200 dark:border-red-500/30"><i data-lucide="alert-triangle" class="w-8 h-8 text-red-600 dark:text-red-500"></i></div>
            <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-white">ยืนยันการทำรายการ</h3><p id="confirm-message" class="text-gray-500 text-sm mb-6"></p>
            <div class="flex gap-3"><button onclick="closeConfirm()" class="flex-1 py-3 rounded-xl border border-gray-300 dark:border-gray-600 font-medium">ยกเลิก</button><button onclick="executeConfirm()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-500">ยืนยัน</button></div>
        </div>
    </div>

    <!-- Edit Item Prompt Modal -->
    <div id="prompt-modal" class="fixed inset-0 bg-black/60 dark:bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 p-4">
        <div class="glass-panel p-6 rounded-2xl max-w-sm w-full gold-glow text-center">
            <h3 class="text-xl font-bold mb-4 text-gray-900 dark:text-white" id="prompt-title">แก้ไขข้อมูล</h3>
            <div class="space-y-3 mb-6 text-left">
                <div><label class="text-xs text-gray-500 ml-1">ชื่อ</label><input type="text" id="prompt-name" class="input-premium py-2" required></div>
                <div><label class="text-xs text-gray-500 ml-1">ลิงก์รูปภาพ (URL)</label><input type="url" id="prompt-img" class="input-premium py-2"></div>
            </div>
            <div class="flex gap-3"><button onclick="closePrompt()" class="flex-1 py-3 rounded-xl border border-gray-300 dark:border-gray-600 font-medium">ยกเลิก</button><button onclick="executePrompt()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">บันทึก</button></div>
        </div>
    </div>
    
    <!-- Edit Shop Settings Modal -->
    <div id="shop-edit-modal" class="fixed inset-0 bg-black/60 dark:bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 p-4">
        <div class="glass-panel p-6 rounded-2xl max-w-sm w-full gold-glow text-center">
            <h3 class="text-xl font-bold mb-4 text-gray-900 dark:text-white"><i data-lucide="settings" class="inline w-5 h-5 mr-1 text-gold-500"></i>ตั้งค่าโปรไฟล์ร้าน</h3>
            <div class="space-y-3 mb-6 text-left">
                <div><label class="text-xs text-gray-500 ml-1">ชื่อร้าน</label><input type="text" id="se-name" class="input-premium py-2" required></div>
                <div><label class="text-xs text-gray-500 ml-1">ลิงก์รูปหน้าร้าน (URL)</label><input type="url" id="se-img" class="input-premium py-2"></div>
                <div><label class="text-xs text-gray-500 ml-1">ที่ตั้งร้าน</label><input type="text" id="se-address" class="input-premium py-2"></div>
                <div><label class="text-xs text-gray-500 ml-1">ประกาศหน้าร้าน / แจ้งเตือนลูกค้า</label><input type="text" id="se-notice" class="input-premium py-2"></div>
            </div>
            <div class="flex gap-3"><button onclick="closeShopEdit()" class="flex-1 py-3 rounded-xl border border-gray-300 dark:border-gray-600 font-medium">ยกเลิก</button><button onclick="executeShopEdit()" class="flex-1 py-3 rounded-xl bg-gold-500 text-black font-bold">อัปเดตร้าน</button></div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/60 dark:bg-black/80 z-[200] hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 p-4">
        <div class="glass-panel rounded-2xl max-w-md w-full max-h-[90vh] flex flex-col gold-glow">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center"><h3 class="font-bold flex items-center gap-2 text-gray-900 dark:text-white"><i data-lucide="receipt" class="w-5 h-5 text-gold-500"></i> รายละเอียดใบเสร็จ</h3><button onclick="closeOrderModal()" class="text-gray-500 p-1"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div id="order-modal-content" class="p-5 overflow-y-auto space-y-4 text-sm text-gray-900 dark:text-white"></div>
        </div>
    </div>

    <!-- Printable Receipt Container -->
    <div id="printable-receipt" class="hidden-view bg-white text-black p-4"></div>

    <!-- ==================== AUTHENTICATION VIEW ==================== -->
    <main id="view-auth" class="flex-grow container mx-auto px-4 flex flex-col items-center justify-center min-h-screen relative overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-yellow-400/20 dark:bg-yellow-600/20 rounded-full blur-[100px] -z-10"></div>
        <div class="w-full max-w-md glass-panel rounded-3xl p-8 gold-glow relative">
            <button onclick="window.toggleTheme()" class="absolute top-4 right-4 text-gray-400 p-2 bg-gray-100 dark:bg-dark-800 rounded-full"><i data-lucide="sun" id="theme-icon-auth" class="w-5 h-5"></i></button>
            <div class="text-center mb-6">
                <div class="w-20 h-20 mx-auto bg-white dark:bg-dark-800 rounded-full border border-gold-500 flex items-center justify-center mb-4"><i data-lucide="scissors" class="w-10 h-10 text-gold-500"></i></div>
                <h1 class="text-3xl font-bold tracking-wider">BARBER <span class="text-gold-500">HUB</span></h1>
                <p class="text-gray-500 text-sm mt-2">ศูนย์รวมร้านตัดผมออนไลน์</p>
            </div>
            
            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
                <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-3 text-xs md:text-sm font-medium tab-btn active">เข้าสู่ระบบ</button>
                <button onclick="switchAuthTab('register')" id="tab-register" class="flex-1 py-3 text-xs md:text-sm font-medium text-gray-500 tab-btn">สมัครลูกค้า</button>
                <button onclick="switchAuthTab('shop')" id="tab-shop" class="flex-1 py-3 text-xs md:text-sm font-medium text-gray-500 tab-btn">เปิดร้านใหม่</button>
            </div>
            
            <!-- Login Form -->
            <form id="form-login" class="space-y-4" onsubmit="handleLogin(event)">
                <input type="text" id="login-username" required class="input-premium" placeholder="Username (ลูกค้า: user1, ร้าน: shop1, แอดมิน: superadmin)">
                <input type="password" id="login-password" required class="input-premium" placeholder="รหัสผ่าน (ทดสอบใช้ 1234 หรือ 999)">
                <div class="flex items-center gap-2 mt-2 px-1"><input type="checkbox" id="remember-me" class="w-4 h-4 accent-gold-500"><label class="text-sm text-gray-500">จำการเข้าสู่ระบบ</label></div>
                <button type="submit" class="w-full bg-gold-500 text-black font-bold py-3.5 rounded-xl shadow-md hover:bg-gold-400 transition">เข้าสู่ระบบ</button>
            </form>
            
            <!-- Register Customer Form -->
            <form id="form-register" class="space-y-4 hidden-view" onsubmit="handleRegister(event, 'user')">
                <div class="grid grid-cols-2 gap-3"><input type="text" id="reg-fname" required class="input-premium" placeholder="ชื่อจริง"><input type="text" id="reg-nname" required class="input-premium" placeholder="ชื่อเล่น"></div>
                <input type="tel" id="reg-phone" required class="input-premium" placeholder="เบอร์โทร">
                <input type="text" id="reg-username" required class="input-premium" placeholder="Username สำหรับเข้าสู่ระบบ">
                <input type="password" id="reg-password" required class="input-premium" placeholder="ตั้งรหัสผ่าน">
                <button type="submit" class="w-full bg-gray-900 dark:bg-dark-700 text-white font-bold py-3.5 rounded-xl">สมัครเป็นลูกค้า</button>
            </form>
            
            <!-- Register Shop Form -->
            <form id="form-shop" class="space-y-3 hidden-view" onsubmit="handleRegister(event, 'admin')">
                <div class="bg-gold-50 dark:bg-gold-500/10 p-3 rounded-lg border border-gold-200 dark:border-gold-500/30 mb-2">
                    <p class="text-xs text-gold-700 dark:text-gold-400 font-bold"><i data-lucide="store" class="w-3 h-3 inline mr-1"></i>ลงทะเบียนเป็นพาร์ทเนอร์ร้านตัดผม</p>
                </div>
                <input type="text" id="reg-s-name" required class="input-premium py-2" placeholder="ชื่อร้านตัดผม">
                <input type="text" id="reg-s-address" required class="input-premium py-2" placeholder="ที่ตั้งร้าน (เช่น สยามซอย 2)">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-s-owner" required class="input-premium py-2" placeholder="ชื่อเจ้าของร้าน">
                    <input type="tel" id="reg-s-phone" required class="input-premium py-2" placeholder="เบอร์โทรศัพท์">
                </div>
                <input type="text" id="reg-s-username" required class="input-premium py-2 border-gold-500" placeholder="Username สำหรับเข้าระบบหลังบ้าน">
                <input type="password" id="reg-s-password" required class="input-premium py-2 border-gold-500" placeholder="ตั้งรหัสผ่าน">
                <button type="submit" class="w-full bg-gold-500 text-black font-bold py-3.5 rounded-xl mt-2">ยืนยันการเปิดร้าน</button>
            </form>
        </div>
    </main>

    <!-- ==================== MAIN APP SHELL ==================== -->
    <div id="app-shell" class="hidden-view flex flex-col min-h-screen">
        <nav class="glass-panel sticky top-0 z-40 border-b-0 border-gold-500/20">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="if(currentUser.role==='user') renderMarketplace()">
                    <div class="w-8 h-8 bg-gold-500 rounded flex items-center justify-center text-black shadow-md"><i data-lucide="scissors" class="w-5 h-5"></i></div>
                    <span class="font-bold tracking-widest text-lg">BARBER HUB</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="hidden md:block text-right mr-2">
                        <span id="user-name-nav" class="text-sm font-bold block"></span>
                        <span id="user-points-nav" class="text-[10px] text-gold-600 dark:text-gold-500"></span>
                    </div>
                    <button onclick="window.toggleTheme()" class="text-gray-500 hover:text-gold-500 p-2 bg-gray-100 dark:bg-dark-800 rounded-lg"><i data-lucide="sun" id="theme-icon-nav" class="w-4 h-4"></i></button>
                    <button onclick="logout()" class="text-red-500 p-2 bg-red-50 dark:bg-red-500/10 rounded-lg"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </nav>

        <div id="main-content" class="flex-grow pb-24 relative"></div>

        <!-- 5-Item Nav (Customer) -->
        <div id="bottom-nav-user" class="fixed bottom-0 w-full glass-panel border-t border-gray-200 dark:border-gray-800 z-50 px-2 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderMarketplace()" class="flex flex-col items-center gap-1 w-1/5 nav-user" id="nav-u-market"><i data-lucide="map-pin" class="w-5 h-5"></i><span class="text-[9px]">ร้าน</span></button>
            <button onclick="renderCart()" class="flex flex-col items-center gap-1 w-1/5 relative nav-user" id="nav-u-cart"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span class="text-[9px]">ตะกร้า</span><span id="cart-badge" class="absolute -top-1 right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view shadow-md">0</span></button>
            <button onclick="renderHistory()" class="flex flex-col items-center gap-1 w-1/5 nav-user" id="nav-u-history"><i data-lucide="receipt" class="w-5 h-5"></i><span class="text-[9px]">ใบเสร็จ</span></button>
            <button onclick="renderUserChatList()" class="flex flex-col items-center gap-1 w-1/5 relative nav-user" id="nav-u-chat"><i data-lucide="message-square" class="w-5 h-5"></i><span class="text-[9px]">ข้อความ</span><span id="chat-u-badge" class="absolute -top-1 right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view shadow-md">0</span></button>
            <button onclick="renderProfile()" class="flex flex-col items-center gap-1 w-1/5 nav-user" id="nav-u-profile"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[9px]">โปรไฟล์</span></button>
        </div>

        <!-- 4-Item Nav (Admin / Shop Owner) -->
        <div id="bottom-nav-admin" class="fixed bottom-0 w-full glass-panel border-t border-gray-200 dark:border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderAdminDashboard()" class="flex flex-col items-center gap-1 w-1/4 nav-admin" id="nav-a-dash"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px]">ร้านของคุณ</span></button>
            <button onclick="renderAdminShop()" class="flex flex-col items-center gap-1 w-1/4 nav-admin" id="nav-a-shop"><i data-lucide="scissors" class="w-5 h-5"></i><span class="text-[10px]">จัดการบริการ</span></button>
            <button onclick="renderAdminPromos()" class="flex flex-col items-center gap-1 w-1/4 nav-admin" id="nav-a-promo"><i data-lucide="ticket" class="w-5 h-5"></i><span class="text-[10px]">โปรโมชั่น</span></button>
            <button onclick="renderAdminChatList()" class="flex flex-col items-center gap-1 w-1/4 relative nav-admin" id="nav-a-chat"><i data-lucide="message-circle" class="w-5 h-5"></i><span class="text-[10px]">แชทลูกค้า</span><span id="chat-a-badge" class="absolute -top-1 right-3 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden-view shadow-md">0</span></button>
        </div>

        <!-- 3-Item Nav (SUPER ADMIN) -->
        <div id="bottom-nav-superadmin" class="fixed bottom-0 w-full glass-panel border-t border-gray-200 dark:border-gray-800 z-50 px-4 py-3 pb-safe flex justify-between items-center hidden-view">
            <button onclick="renderSuperDash()" class="flex flex-col items-center gap-1 w-1/3 nav-superadmin" id="nav-sa-dash"><i data-lucide="shield-check" class="w-5 h-5"></i><span class="text-[10px]">ระบบรวม</span></button>
            <button onclick="renderSuperShops()" class="flex flex-col items-center gap-1 w-1/3 nav-superadmin" id="nav-sa-shops"><i data-lucide="store" class="w-5 h-5"></i><span class="text-[10px]">จัดการร้านค้า</span></button>
            <button onclick="renderSuperUsers()" class="flex flex-col items-center gap-1 w-1/3 nav-superadmin" id="nav-sa-users"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[10px]">จัดการผู้ใช้</span></button>
        </div>
    </div>

    <!-- JS Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==================== INITIAL MOCK DATA ====================
        let db = {
            users: [
                { id: 'sa1', username: 'superadmin', password: '999', fname: 'ผู้ดูแลระบบสูงสุด', nname: 'SuperAdmin', phone: '000', role: 'superadmin', status: 'approved' },
                { id: 'u1', username: 'shop1', password: '1234', fname: 'คุณสมเกียรติ', nname: 'แอดมิน', phone: '080000', role: 'admin', shopId: 'shop1' },
                { id: 'u2', username: 'user1', password: '1234', fname: 'สมชาย', nname: 'ชาย', phone: '081234', role: 'user', points: 150 }
            ],
            shops: [
                { id: 'shop1', name: 'The Gentleman Barber', image: 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=500&q=80', address: 'สยามสแควร์', rating: 4.8, notice: 'จองคิวล่วงหน้า 15 นาที' },
                { id: 'shop2', name: 'Vintage Cuts', image: 'https://images.unsplash.com/photo-1622286342621-4bd786c2447c?auto=format&fit=crop&w=500&q=80', address: 'เอกมัย ซอย 1', rating: 4.5, notice: 'มีที่จอดรถหน้าร้าน' }
            ],
            barbers: [
                { id: 'b1', shopId: 'shop1', name: 'ช่างอาร์ท (Master)', image: 'https://images.unsplash.com/photo-1618018352910-72b15d2d550c?auto=format&fit=crop&w=150&q=80', status: 'available' },
                { id: 'b2', shopId: 'shop2', name: 'ช่างแจ็ค (Vintage)', image: '', status: 'available' }
            ],
            services: [
                { id: 's1', shopId: 'shop1', name: 'Premium Haircut', desc: 'ตัดผม + เซ็ตทรง', price: 500, type: 'service', image: '' },
                { id: 's2', shopId: 'shop2', name: 'Classic Fade', desc: 'ทรงวินเทจ', price: 400, type: 'service', image: '' }
            ],
            products: [{ id: 'p1', shopId: 'shop1', name: 'Pomade Suavecito', desc: 'โพเมดเซ็ตผม', price: 650, type: 'product', image: '' }],
            promotions: [{ id: 'pr1', shopId: 'shop1', code: 'DISCOUNT10', discountPercent: 10, minSpend: 500, desc: 'ลด 10% ยอด 500 บ. ขึ้นไป' }],
            transactions: [], messages: [] 
        };

        let localCart = [], currentUser = null, isFirebaseReady = false, stateDocRef = null;
        let activeShopId = null; 
        let activeChatSession = null; 

        // --- Core Bindings for Global Access ---
        window.updateThemeIcons = function() {
            const isDark = document.documentElement.classList.contains('dark');
            const navIcon = document.getElementById('theme-icon-nav');
            const authIcon = document.getElementById('theme-icon-auth');
            if(navIcon) navIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');

        // --- Firebase ---
        async function setupFirebase() {
            try {
                let conf = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                if (!conf) { lucide.createIcons(); window.updateThemeIcons(); checkAutoLogin(); return; }
                const app = initializeApp(conf); const auth = getAuth(app); const fs = getFirestore(app); const appId = typeof __app_id !== 'undefined' ? __app_id : 'barber-hub';
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    if(user) {
                        stateDocRef = doc(fs, 'artifacts', appId, 'public', 'data', 'hubDb', 'v3');
                        const snap = await getDoc(stateDocRef); if(!snap.exists()) await setDoc(stateDocRef, db);
                        onSnapshot(stateDocRef, (d) => { if(d.exists()) { db = d.data(); refreshView(); }});
                        isFirebaseReady = true; checkAutoLogin();
                    }
                });

            let html = `<div class="flex justify-between border-b border-gray-200 dark:border-gray-800 pb-2 mb-3"><span class="text-xs text-gray-500">รหัส: ${tx.id}</span><span class="text-xs text-gray-500">${new Date(tx.createdAt).toLocaleString('th-TH')}</span></div><div class="bg-gray-50 dark:bg-dark-800 p-3 rounded-lg mb-3"><p class="font-bold mb-1 text-gold-600 dark:text-gold-500"><i data-lucide="user" class="w-4 h-4 inline"></i> ลูกค้า</p><p class="text-xs">ชื่อ: ${tx.userName}</p></div>`;
            if(tx.booking) html += `<div class="bg-gray-50 dark:bg-dark-800 p-3 rounded-lg mb-3"><p class="font-bold mb-1 text-gold-600 dark:text-gold-500"><i data-lucide="calendar" class="w-4 h-4 inline"></i> จองคิว</p><p class="text-xs">วันที่: ${tx.booking.date} เวลา: ${tx.booking.time} น.</p><p class="text-xs">ช่าง: ${tx.booking.barberName}</p></div>`;
            html += `<div class="mb-3"><p class="font-bold border-b border-gray-200 dark:border-gray-800 pb-1 mb-2">รายการ</p>` + tx.items.map(i=>`<div class="flex justify-between text-xs mb-1"><span>- ${i.name}</span><span>${formatMoney(i.price)}</span></div>`).join('') + `</div><div class="flex justify-between border-t border-gray-200 dark:border-gray-800 pt-2"><span class="text-xs bg-gray-200 dark:bg-dark-800 px-2 py-1 rounded">ชำระ: ${tx.payment==='cash'?'เงินสด':'โอน'}</span><span class="font-bold text-gold-600 dark:text-gold-500 text-lg">${formatMoney(tx.total)}</span></div>`;
            document.getElementById('order-modal-content').innerHTML = html; document.getElementById('order-modal').classList.remove('hidden-view'); lucide.createIcons();
        };
        window.closeOrderModal = () => { document.getElementById('order-modal').classList.add('hidden-view'); };

        window.renderAdminShop = () => {
            setActiveNav('nav-a-shop', 'nav-admin'); activeChatSession = null; const shopId = currentUser.shopId;
            const rT = (url, type) => url ? `<img src="${url}" class="w-10 h-10 object-cover rounded${type==='user'?'-full':''} bg-gray-100 dark:bg-dark-900 flex-shrink-0">` : `<div class="w-10 h-10 bg-gray-100 dark:bg-dark-900 rounded${type==='user'?'-full':''} flex items-center justify-center flex-shrink-0"><i data-lucide="${type==='service'?'scissors': type==='user'?'user':'package'}" class="w-4 h-4 text-gray-400"></i></div>`;
            let bHTML = db.barbers.filter(b=>b.shopId===shopId).map(b => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 shadow-sm"><div class="flex items-center gap-3 flex-grow">${rT(b.image, 'user')}<span class="text-sm font-medium">${b.name}</span><button onclick="editItem('barber','${b.id}')" class="text-blue-500 p-1"><i data-lucide="edit-2" class="w-3 h-3"></i></button></div><div class="flex items-center gap-2"><button onclick="toggleB('${b.id}')" class="px-3 py-1 rounded-lg text-xs font-bold ${b.status==='available'?'bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-400':'bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-400'}">${b.status==='available'?'ว่าง':'ติดลูกค้า'}</button><button onclick="deleteI('barber','${b.id}')" class="text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('');
            let sHTML = db.services.filter(s=>s.shopId===shopId).map(s => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 shadow-sm"><div class="flex items-center gap-3">${rT(s.image, 'service')}<div><p class="text-sm font-medium">${s.name}</p><p class="text-xs text-gold-600 dark:text-gold-500">${formatMoney(s.price)}</p></div><button onclick="editItem('service','${s.id}')" class="text-blue-500 p-1"><i data-lucide="edit-2" class="w-3 h-3"></i></button></div><button onclick="deleteI('service','${s.id}')" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            let pH = db.products.filter(p=>p.shopId===shopId).map(p => `<div class="flex justify-between items-center bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 shadow-sm"><div class="flex items-center gap-3">${rT(p.image, 'product')}<div><p class="text-sm font-medium">${p.name}</p><p class="text-xs text-gold-600 dark:text-gold-500">${formatMoney(p.price)}</p></div><button onclick="editItem('product','${p.id}')" class="text-blue-500 p-1"><i data-lucide="edit-2" class="w-3 h-3"></i></button></div><button onclick="deleteI('product','${p.id}')" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            document.getElementById('main-content').innerHTML = `<div class="p-4 space-y-6"><div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 flex items-center gap-2"><i data-lucide="user-check" class="w-4 h-4 text-gold-500"></i> ช่างในร้าน</h3>${bHTML}<form onsubmit="addBarber(event)" class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 space-y-2"><input type="text" id="add-b-name" placeholder="ชื่อช่าง" class="input-premium py-2.5 text-sm" required><input type="url" id="add-b-img" placeholder="ลิงก์รูป" class="input-premium py-2.5 text-sm"><button type="submit" class="bg-gold-500 text-black rounded-xl px-4 py-3 w-full font-bold shadow-md">เพิ่มช่าง</button></form></div><div class="glass-panel p-4 rounded-2xl"><h3 class="text-sm font-bold mb-3 flex items-center gap-2"><i data-lucide="scissors" class="w-4 h-4 text-gold-500"></i> บริการ</h3>${sHTML}<h3 class="text-sm font-bold mt-6 mb-3 flex items-center gap-2"><i data-lucide="package" class="w-4 h-4 text-gold-500"></i> สินค้า</h3>${pH}<form onsubmit="addItem(event)" class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 space-y-3"><h4 class="text-xs font-bold text-gray-500 uppercase">เพิ่มใหม่</h4><select id="add-type" class="input-premium py-2.5 text-sm appearance-none"><option value="service">บริการ/ทรงผม</option><option value="product">สินค้า</option></select><input type="text" id="add-name" placeholder="ชื่อรายการ" class="input-premium py-2.5 text-sm" required><input type="url" id="add-img" placeholder="ลิงก์รูปลิงก์รูป" class="input-premium py-2.5 text-sm"><input type="number" id="add-price" placeholder="ราคา (บาท)" class="input-premium py-2.5 text-sm" required><button type="submit" class="bg-gray-900 dark:bg-white text-white dark:text-black rounded-xl px-4 py-3 w-full font-bold shadow-md">บันทึกรายการ</button></form></div></div>`; lucide.createIcons();
        };

        window.renderAdminPromos = () => {
            setActiveNav('nav-a-promo', 'nav-admin'); activeChatSession = null; const shopId = currentUser.shopId;
            let prH = db.promotions.filter(p=>p.shopId===shopId).map(p => `<div class="bg-white dark:bg-dark-800 p-3 rounded-lg mb-2 shadow-sm border-l-4 border-gold-500 flex justify-between items-center"><div><p class="font-bold text-sm">${p.code}</p><p class="text-[10px] text-gray-500">${p.desc}</p></div><button onclick="deleteI('promo','${p.id}')" class="text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('') || '<p class="text-xs text-gray-500">ยังไม่มีโปรโมชั่น</p>';
            document.getElementById('main-content').innerHTML = `<div class="p-4 space-y-4"><div class="glass-panel p-4 rounded-xl"><h3 class="font-bold mb-3 flex items-center gap-2"><i data-lucide="ticket" class="w-4 h-4 text-gold-500"></i> โค้ดส่วนลด</h3>${prH}<form onsubmit="addPromo(event)" class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 space-y-2"><input type="text" id="pr-code" placeholder="ชื่อโค้ด (เช่น SALE20)" class="input-premium py-2 text-xs uppercase" required><div class="flex gap-2"><input type="number" id="pr-disc" placeholder="% ลด" class="input-premium py-2 text-xs w-1/2" required><input type="number" id="pr-min" placeholder="ยอดขั้นต่ำ" class="input-premium py-2 text-xs w-1/2" required></div><button type="submit" class="bg-gray-900 dark:bg-white text-white dark:text-black w-full py-2.5 rounded-lg text-xs font-bold shadow-md">สร้างโปร</button></form></div></div>`; lucide.createIcons();
        };

        window.renderAdminChatList = () => {
            setActiveNav('nav-a-chat', 'nav-admin'); activeChatSession = null; const shopId = currentUser.shopId;
            const msgs = db.messages.filter(m => m.shopId === shopId), userIds = [...new Set(msgs.map(m => m.userId))];
            let html = userIds.length===0 ? `<div class="text-center text-gray-500 mt-10 text-sm">ยังไม่มีข้อความ</div>` : userIds.map(uid => {
                const u = db.users.find(x=>x.id===uid), uMsgs = msgs.filter(m=>m.userId===uid), last = uMsgs[uMsgs.length-1], unread = uMsgs.filter(m=>m.senderId!=='admin'&&!m.read).length; if(!u) return '';
                return `<div onclick="renderAdminChatRoom('${uid}')" class="glass-panel p-3 rounded-xl mb-2 flex items-center gap-3 cursor-pointer shadow-sm relative"><div class="w-10 h-10 bg-gray-100 dark:bg-dark-700 rounded-full flex justify-center items-center text-gold-500 relative border border-gray-200 dark:border-gray-600"><i data-lucide="user" class="w-5 h-5"></i>${unread>0?`<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">${unread}</span>`:''}</div><div class="flex-grow min-w-0"><div class="flex justify-between items-baseline"><h4 class="font-bold text-sm truncate ${unread>0?'text-gold-600 dark:text-gold-500':''}">${u.fname}</h4><span class="text-[9px] text-gray-500">${formatTime(last.timestamp)}</span></div><p class="text-xs text-gray-500 truncate ${unread>0?'font-bold':''}">${last.senderId==='admin'?'คุณ: ':'ลูกค้า: '}${last.text}</p></div></div>`;
            }).join('');
            document.getElementById('main-content').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">แชทลูกค้า</h2>${html}</div>`; lucide.createIcons();
        };

        window.renderAdminChatRoom = async (userId) => {
            setActiveNav('nav-a-chat', 'nav-admin'); activeChatSession = { shopId: currentUser.shopId, userId };
            let changed = false; db.messages.forEach(m => { if(m.shopId===currentUser.shopId && m.userId===userId && m.senderId!=='admin' && !m.read){ m.read=true; changed=true; }}); if(changed){ updateBadges(); await sync(); }
            const tgt = db.users.find(u=>u.id===userId), msgs = db.messages.filter(m => m.shopId===currentUser.shopId && m.userId===userId);
            let cHTML = msgs.map(m => { const isAd = m.senderId==='admin'; const r = isAd ? (m.read ? `<span class="text-[9px] text-green-500 flex items-center gap-0.5"><i data-lucide="check-check" class="w-3 h-3"></i></span>` : `<span class="text-[9px] text-gray-400 flex items-center gap-0.5"><i data-lucide="check" class="w-3 h-3"></i></span>`) : ''; return `<div class="flex flex-col ${isAd ? 'items-end':'items-start'} mb-3"><div class="max-w-[80%] p-2.5 text-sm shadow-sm ${isAd ? 'chat-me' : 'chat-other'}">${m.text}</div><div class="flex items-center gap-1 mt-1"><span class="text-[9px] text-gray-500">${formatTime(m.timestamp)}</span>${r}</div></div>`; }).join('');
            document.getElementById('main-content').innerHTML = `<div class="flex flex-col h-[calc(100vh-140px)]"><div class="p-3 bg-white dark:bg-dark-900 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3"><button onclick="renderAdminChatList()" class="text-gray-500 p-2"><i data-lucide="chevron-left" class="w-5 h-5"></i></button><h2 class="font-bold text-sm">แชทกับ: ${tgt.fname}</h2></div><div id="admin-chat-box" class="flex-grow p-4 overflow-y-auto bg-gray-50 dark:bg-black/50">${cHTML}</div><form onsubmit="sendChat(event, '${currentUser.shopId}', '${userId}')" class="p-3 bg-white dark:bg-dark-900 border-t border-gray-200 dark:border-gray-800 flex gap-2"><input type="text" id="chat-in" class="input-premium py-2 text-sm flex-grow rounded-full" placeholder="พิมพ์ตอบกลับ..." required autocomplete="off"><button type="submit" class="bg-gold-500 text-black w-10 h-10 rounded-full flex items-center justify-center shadow-sm"><i data-lucide="send" class="w-4 h-4 ml-1"></i></button></form></div>`; lucide.createIcons(); const b=document.getElementById('admin-chat-box'); if(b) b.scrollTop=b.scrollHeight;
        };

        window.sendChat = async (e, shopId, userId) => {
            e.preventDefault(); const inEl = document.getElementById('chat-in'), txt = inEl.value.trim(); if(!txt) return;
            db.messages.push({ id: 'm'+generateId(), shopId, userId, senderId: currentUser.role==='admin'?'admin':currentUser.id, text: txt, timestamp: new Date().toISOString(), read: false });
            inEl.value=''; if(currentUser.role==='admin') window.renderAdminChatRoom(userId); else window.renderUserChatRoom(shopId); await sync();
        };

        window.toggleB = async (id) => { const b=db.barbers.find(x=>x.id===id); if(b){ b.status=b.status==='available'?'busy':'available'; window.renderAdminShop(); await sync(); } };
        window.deleteI = (t, id) => { window.showConfirm('ลบรายการนี้?', async () => { if(t==='barber') db.barbers=db.barbers.filter(x=>x.id!==id); if(t==='service') db.services=db.services.filter(x=>x.id!==id); if(t==='product') db.products=db.products.filter(x=>x.id!==id); if(t==='promo') db.promotions=db.promotions.filter(x=>x.id!==id); if(document.getElementById('nav-a-shop').classList.contains('text-gold-500')) window.renderAdminShop(); else window.renderAdminPromos(); await sync(); showToast('ลบสำเร็จ'); }); };
        window.deleteTx = (id) => { window.showConfirm('ลบออเดอร์นี้?', async () => { db.transactions=db.transactions.filter(t=>t.id!==id); window.renderAdminDashboard(); await sync(); showToast('ลบสำเร็จ'); }); };
        
        window.editItem = (t, id) => { const l=t==='barber'?db.barbers:t==='service'?db.services:db.products; const i=l.find(x=>x.id===id); if(i) { window.showPrompt(`แก้${t}`, i.name, i.image||'', async (n,img) => { i.name=n; i.image=img; window.renderAdminShop(); await sync(); showToast('อัปเดตสำเร็จ', 'success'); }); } };
        window.addBarber = async (e) => { e.preventDefault(); const n = document.getElementById('add-b-name').value.trim(); const img = document.getElementById('add-b-img').value.trim(); if(n) { db.barbers.push({ id: 'b_' + generateId(), shopId: currentUser.shopId, name: n, image: img || null, status: 'available' }); window.renderAdminShop(); await sync(); showToast('เพิ่มช่างสำเร็จ', 'success'); } };
        window.addItem = async (e) => { e.preventDefault(); const t=document.getElementById('add-type').value, i={id:(t==='service'?'s':'p')+generateId(), shopId:currentUser.shopId, name:document.getElementById('add-name').value, desc:'', price:parseInt(document.getElementById('add-price').value), type:t, image:document.getElementById('add-img').value||null}; if(t==='service') db.services.push(i); else db.products.push(i); window.renderAdminShop(); await sync(); showToast('เพิ่มสำเร็จ'); };
        window.addPromo = async (e) => { e.preventDefault(); const p={id:'pr'+generateId(), shopId:currentUser.shopId, code:document.getElementById('pr-code').value.toUpperCase(), discountPercent:parseInt(document.getElementById('pr-disc').value), minSpend:parseInt(document.getElementById('pr-min').value), desc:`ลด ${document.getElementById('pr-disc').value}% ขั้นต่ำ ${document.getElementById('pr-min').value}บ.`}; db.promotions.push(p); window.renderAdminPromos(); await sync(); showToast('สร้างโปรสำเร็จ'); };

        document.getElementById('view-auth').classList.remove('hidden-view'); lucide.createIcons();
    </script>
</body>
</html>
